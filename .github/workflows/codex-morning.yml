name: Codex morning check-in

on:
  schedule:
    # GitHub Actions cron uses UTC.
    # 16:00 UTC is 9am during Pacific daylight time.
    # 17:00 UTC is 9am during Pacific standard time.
    - cron: "0 16 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  morning:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Check Pacific time
        id: pacific_time
        run: |
          hour="$(TZ=America/Los_Angeles date +%H)"
          if [ "$hour" = "09" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v5
        if: steps.pacific_time.outputs.run == 'true'

      - name: Run Codex morning check-in
        if: steps.pacific_time.outputs.run == 'true'
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          output-file: codex-morning.md
          prompt: |
            Good morning. Please do a lightweight daily check-in for this repository.

            Look at the current codebase and recent context available in git.
            Do not modify files.

            Return:
            - A short good-morning greeting.
            - Anything important I should look at today.
            - Any obvious broken tests, stale TODOs, risky open work, or maintenance tasks.
            - One suggested next action.

      - name: Open daily issue
        if: steps.pacific_time.outputs.run == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const title = `Codex morning check-in: ${new Date().toISOString().slice(0, 10)}`;
            const body = fs.readFileSync("codex-morning.md", "utf8");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
